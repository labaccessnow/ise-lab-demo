# AP + dot1x WLAN — bring a Cisco 2802i in as a real 802.1X test AP.
# (Validate the exact wireless CLI against the live 9800 before trusting it —
#  written from docs, not yet run; the AAA/RADIUS block above IS verified-shape.)
#
# Physical / join prerequisites (one-time, outside Ansible):
#   1. CONVERT the 2802i ME->CAPWAP: it currently runs a Mobility-Express image on
#      LabME. From the AP console/U-Boot, `ap-type capwap` (reverse of the ME
#      conversion in memory ref-ap-lightweight-to-me-conversion) so it boots a
#      lightweight CAPWAP image. The 9800 pushes the matching AP image on join.
#   2. CABLE it onto VLAN 1800: plug the AP into a CRS317 port in vnet v1800 (the
#      enclave L2, gw 0.0.0.0) so it can reach the WLC mgmt IP 0.0.0.0.
#   3. AP gets an IP on 0.0.0.0/24 (dc-demo DHCP scope, or static) + DISCOVERS the
#      WLC via DHCP option 43 = 0.0.0.0, DNS CISCO-CAPWAP-CONTROLLER.demo.lab,
#      or manual on the AP CLI: `capwap ap primary-base wlc-demo 0.0.0.0`.
#
# WLC-side config to add here once the box is live (country MUST be set or APs
# won't join): wireless country US; an AP join profile; a dot1x `wlan` bound to
# `aaa authentication dot1x ISE-DOT1X` + `aaa-override`; a `wireless profile policy`;
# and a `wireless tag policy` mapping WLAN->policy, applied to the AP.
#   ISE side: a Wireless-802.1X policy set keyed on this NAD; an authz result.
# ============================================================================
