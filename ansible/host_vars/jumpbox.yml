---
# Enclave jumpbox (VMID 134) — XFCE + xrdp, streamed pixels-only via Guacamole.
# Unlike the enclave devices (provisioned via the PVE API), the jumpbox is
# SSH-reachable, so the jumpbox_ux role connects to it directly.
#
# Public-repo policy: 0.0.0.0 placeholders here; substitute the real enclave
# addresses at deploy time (same as the other host_vars).
ansible_host: "0.0.0.0"          # jumpbox mgmt IP
ansible_user: "labuser"

role: jumpbox
jumpbox_user: "labuser"
jumpbox_ntp_source: "0.0.0.0"    # enclave DC (keeps the clock on enclave time)

# Device cards shown on the start page (real URLs supplied at deploy).
jumpbox_devices:
  - { name: "Cisco ISE",      desc: "Policy & identity — admin GUI", url: "https://0.0.0.0" }
  - { name: "Cisco 9800 WLC", desc: "Wireless LAN controller",       url: "https://0.0.0.0" }
  - { name: "Palo Alto NGFW", desc: "PAN-OS management",             url: "https://0.0.0.0" }
  - { name: "Arista vEOS",    desc: "Data-center switch",            url: "https://0.0.0.0" }
